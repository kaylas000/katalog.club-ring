<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Ring — Boxing</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #0A0A0B;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw; height: 100vh;
            color: #F0F0F4;
        }

        #gameCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(10,10,11,0.92);
            backdrop-filter: blur(12px);
            z-index: 10;
        }
        .overlay.hidden, #controlsDisplay.hidden { display: none; }

        .logo-tag {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px; font-weight: 600;
            color: #C9A227;
            letter-spacing: 8px;
            border: 1px solid #C9A227;
            padding: 8px 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .logo-big {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px;
            letter-spacing: 2px;
            margin-bottom: 0px;
            line-height: 1;
        }
        .logo-white { color: #F0F0F4; }
        .logo-dash { color: #C9A227; }
        .logo-bronze {
            background: linear-gradient(135deg, #8B6914, #D4A843, #8B6914);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 72px;
            line-height: 1;
            margin-bottom: 0px;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #8B6914, #D4A843, #8B6914);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px; font-weight: 400;
            color: #B0B1B8;
            letter-spacing: 6px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .btn-primary {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px; font-weight: 600;
            padding: 14px 40px;
            margin: 3px;
            line-height: 1;
            background: linear-gradient(135deg, #8B6914, #C9A227);
            color: #0A0A0B;
            border: 1px solid #C9A227;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 280px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.4), 0 0 60px rgba(201, 162, 39, 0.15);
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .btn-secondary {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px; font-weight: 600;
            padding: 12px 35px;
            margin: 3px;
            line-height: 1;
            background: transparent;
            color: #C9A227;
            border: 1px solid #C9A227;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 280px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-secondary:hover {
            background: rgba(201, 162, 39, 0.1);
            transform: translateY(-1px);
        }

        .diff-row {
            display: flex; gap: 10px;
            margin-top: 15px;
        }
        .diff-btn {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px; font-weight: 600;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #3A3A48;
            color: #757580;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .diff-btn:hover, .diff-btn.selected {
            border-color: #C9A227;
            color: #C9A227;
            background: rgba(201, 162, 39, 0.08);
        }

        #controlsDisplay {
            position: fixed;
            bottom: 10px; right: 10px;
            background: rgba(10,10,11,0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #2A2A35;
            border-radius: 8px;
            padding: 14px 18px;
            z-index: 15;
        }
        #controlsDisplay .k {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px; font-weight: 700;
            color: #C9A227;
        }
        #controlsDisplay .t {
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 400;
            color: #B0B1B8;
        }
        #controlsDisplay br { margin-bottom: 4px; }

        .result-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 64px;
            background: linear-gradient(135deg, #C9A227, #D4A843);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .result-winner {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px; font-weight: 600;
            color: #B0B1B8;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #C9A227, transparent);
            width: 200px;
            margin: 5px 0;
        }

        /* Touch controls */
        #rotateOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #0A0A0B;
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .touch-zone { display: none; }
        @media (max-width: 850px) and (orientation: landscape) {
            body { display: flex; flex-direction: row; }
            #controlsDisplay { display: none !important; }
            .overlay .title { font-size: 48px; }
            .overlay .subtitle { font-size: 10px; }
            .overlay .btn-primary, .overlay .btn-secondary { font-size: 11px; padding: 10px 20px; min-width: 180px; }
            .logo-big { font-size: 40px; }
            .result-title { font-size: 48px; }
            #gameCanvas { position: static; width: auto; height: 100vh; flex: 1; }
            .touch-zone {
                display: flex !important;
                width: 100px; height: 100vh;
                z-index: 30;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 10px 6px;
                gap: 12px;
                background: rgba(10,10,11,0.6);
            }
            .touch-zone.left { order: -1; }
            .touch-zone.right { order: 1; }
            .touch-btn {
                width: 80px; height: 80px;
                border-radius: 12px;
                border: 1px solid #C9A227;
                background: rgba(201,162,39,0.1);
                color: #C9A227;
                font-family: 'Montserrat', sans-serif;
                font-size: 11px; font-weight: 600;
                display: flex; align-items: center; justify-content: center;
                touch-action: none;
                -webkit-tap-highlight-color: transparent;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .touch-btn:active { background: rgba(201,162,39,0.35); border-color: #D4A843; color: #D4A843; }
            .touch-block { background: rgba(58,58,72,0.2); border-color: #3A3A48; color: #C0C1C8; }
        }
        @media (max-width: 850px) and (orientation: portrait) {
            #rotateOverlay { display: flex !important; }
            .overlay { display: none !important; }
            #gameCanvas { display: none !important; }
            .touch-zone { display: none !important; }
            #controlsDisplay { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="rotateOverlay">
        <div style="font-size: 48px; margin-bottom: 20px;">📱</div>
        <div style="font-family: 'Montserrat', sans-serif; font-size: 14px; color: #C9A227; text-align: center; line-height: 2;">Поверни телефон<br>на бок</div>
    </div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- MAIN MENU -->
    <div id="mainMenu" class="overlay">
        <div class="logo-big">
            <span class="logo-white">CLUB</span><span class="logo-dash">-</span><span class="logo-bronze">RING</span>
        </div>
        <div class="title">BOXING</div>
        <div class="subtitle">CHAMPIONSHIP</div>
        <div class="divider"></div>
        <button class="btn-primary" onclick="startTraining()">ТРЕНИРОВКА</button>
        <button class="btn-secondary" onclick="startFight('ai')">ПРОТИВ КОМПЬЮТЕРА</button>
        <button class="btn-secondary" onclick="startFight('pvp')">ПРОТИВ ИГРОКА</button>
        <div class="diff-row">
            <button class="diff-btn selected" data-diff="easy">ЛЕГКО</button>
            <button class="diff-btn" data-diff="medium">СРЕДНЕ</button>
            <button class="diff-btn" data-diff="hard">СЛОЖНО</button>
        </div>
    </div>

    <!-- CONTROLS HINT -->
    <div id="controlsDisplay" class="hidden">
        <span class="k">A/D</span> <span class="t">Движение</span> &nbsp;
        <span class="k">Q</span> <span class="t">Защита</span><br>
        <span class="k">G</span> <span class="t">Джеб</span> &nbsp;
        <span class="k">Пробел</span> <span class="t">Кросс</span> &nbsp;
        <span class="k">E</span> <span class="t">Апперкот</span>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen" class="overlay hidden">
        <div class="logo-big">
            <span class="logo-white">CLUB</span><span class="logo-dash">-</span><span class="logo-bronze">RING</span>
        </div>
        <div class="result-title" id="resultTitle">НОКАУТ!</div>
        <div class="result-winner" id="resultWinner">ИГРОК 1 ПОБЕДИЛ</div>
        <div class="divider"></div>
        <button class="btn-primary" onclick="showMenu()">МЕНЮ</button>
        <button class="btn-secondary" onclick="startFight(G.mode)">РЕВАНШ</button>
    </div>

    <!-- TOUCH CONTROLS -->
    <div class="touch-zone left">
        <button class="touch-btn" id="btnLeft">◀</button>
        <button class="touch-btn" id="btnRight">▶</button>
        <button class="touch-btn touch-block" id="btnBlock">🛡</button>
    </div>
    <div class="touch-zone right">
        <button class="touch-btn" id="btnJab">ДЖЕБ</button>
        <button class="touch-btn" id="btnCross">КРОСС</button>
        <button class="touch-btn" id="btnUpper">АППЕР</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
